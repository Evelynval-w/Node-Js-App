name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: |
          echo "PORT=3000" >> .env
          echo "NODE_ENV=test" >> .env
          echo "DATABASE_URL=./database.sqlite" >> .env
          echo "API_KEY=test-api-key-ci" >> .env
          echo "JWT_SECRET=test-jwt-secret-for-ci-min-32-characters" >> .env
          echo "JWT_EXPIRES_IN=24h" >> .env

      - name: Verify app starts
        run: |
          timeout 5 node src/index.js || true
          echo "App entry point verified"

      - name: Run tests
        run: npm test
        env:
          CI: true
          NODE_ENV: test
